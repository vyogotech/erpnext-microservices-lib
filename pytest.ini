[pytest]
# Pytest configuration for frappe-microservice-lib

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require running services)
    slow: Slow tests that take more than 1 second

# Coverage settings
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=frappe_microservice
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-branch
    --cov-fail-under=80

# Test paths
testpaths = tests

# Ignore paths
norecursedirs = .git .tox dist build *.egg __pycache__

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (prevent hanging)
timeout = 300

# Parallel execution (optional, uncomment to enable)
# addopts = -n auto
