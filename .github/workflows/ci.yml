name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "version-*"]
    tags: ["v*"]
  pull_request:
    branches: [main, develop, "version-*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y frappe-microservice || true
          pip install -e ".[dev]"

      - name: Run TDD Unit Tests (Pytest)
        run: |
          PYTHONPATH=. pytest -m "not integration" --alluredir=allure-results tests/

      - name: Run BDD Behavioral Tests (Behave)
        run: |
          PYTHONPATH=. behave -f allure_behave.formatter:AllureFormatter -o allure-results features/

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: allure-results
          path: allure-results
          retention-days: 1

  integration-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start integration container
        run: docker compose -f docker-compose.integration.yml up -d

      - name: Wait for Frappe site
        run: |
          BENCH="/home/frappe/frappe-bench"
          PYTHON="$BENCH/env/bin/python"
          for i in $(seq 1 40); do
            if docker compose -f docker-compose.integration.yml exec -T dev-central-site \
              bash -c "mkdir -p $BENCH/dev.localhost/logs /home/frappe/logs && \
              $PYTHON -c \"
          import frappe
          frappe.init(site='dev.localhost', sites_path='$BENCH/sites')
          frappe.connect()
          frappe.db.sql('SELECT 1')
          frappe.destroy()
          print('ready')
          \"" 2>/dev/null; then
              echo "Site ready"
              exit 0
            fi
            echo "  attempt $i/40..."
            sleep 10
          done
          echo "FATAL: site not ready" && exit 1

      - name: Bootstrap ERPNext test data
        run: |
          BENCH="/home/frappe/frappe-bench"
          PYTHON="$BENCH/env/bin/python"
          HAS_COMPANY=$(docker compose -f docker-compose.integration.yml exec -T dev-central-site \
            "$PYTHON" -c "
          import frappe
          frappe.init(site='dev.localhost', sites_path='$BENCH/sites')
          frappe.connect()
          print(frappe.db.count('Company'))
          frappe.destroy()
          " 2>/dev/null || echo "0")
          if [ "$HAS_COMPANY" = "0" ]; then
            echo "No Company — bootstrapping site (legacy before_tests or setup_complete)"
            docker compose -f docker-compose.integration.yml exec -T dev-central-site \
              env FRAPPE_SITE=dev.localhost FRAPPE_SITES_PATH="$BENCH/sites" \
              "$PYTHON" /mnt/lib/scripts/bootstrap_integration_site.py
          fi

      - name: Install library and test dependencies
        run: |
          docker compose -f docker-compose.integration.yml exec -T dev-central-site \
            /home/frappe/frappe-bench/env/bin/pip install --quiet /mnt/lib pytest pytest-cov

      - name: Run integration tests with coverage
        run: |
          docker compose -f docker-compose.integration.yml exec -T dev-central-site \
            /home/frappe/frappe-bench/env/bin/python -m pytest \
              /mnt/lib/tests/integration/ \
              --confcutdir=/mnt/lib/tests/integration \
              -c /mnt/lib/tests/integration/pytest.ini \
              --cov=frappe_microservice \
              --cov-report=term-missing \
              --cov-branch \
              -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  build:
    needs: [test, integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate Image Tag & Versions
        id: vars
        run: |
          # Default values
          TAG="latest"
          VERSION="version-16"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="pr-${{ github.event.number }}"
            # Use base branch version for PRs if it's a version branch
            if [[ "${{ github.base_ref }}" == version-* ]]; then
              VERSION="${{ github.base_ref }}"
            elif [[ "${{ github.base_ref }}" == "develop" ]]; then
              VERSION="develop"
            fi
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            TAG="develop"
            VERSION="develop"
          elif [[ "${{ github.ref }}" == refs/heads/version-* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/heads\///')
            TAG="$VERSION"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="latest"
            VERSION="version-16"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Convert repository name to lowercase for GHCR
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Build Image with Buildah
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ steps.vars.outputs.image_name }}
          tags: ${{ steps.vars.outputs.tag }}
          containerfiles: |
            ./Containerfile
          build-args: |
            FRAPPE_VERSION=${{ steps.vars.outputs.version }}
            ERPNEXT_VERSION=${{ steps.vars.outputs.version }}

      - name: Push to GHCR
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build_image.outputs.image }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
